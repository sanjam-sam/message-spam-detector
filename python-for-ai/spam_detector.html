<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Spam Detector </title>
  <style>
    :root {
      --bg1: #f6f9ff;
      --bg2: #e7f3ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --danger: #dc2626;
      --success: #059669;
      --border: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(2, 132, 199, 0.15);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    #checkBtn {
      background: var(--primary);
      color: #fff;
    }

    #checkBtn:hover {
      background: var(--primary-hover);
    }

    #clearBtn {
      background: #e2e8f0;
      color: #1e293b;
    }

    #clearBtn:hover {
      background: #cbd5e1;
    }

    #result {
      margin-top: 18px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .spam {
      color: var(--danger);
    }

    .not-spam {
      color: var(--success);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Spam Detector</h1>
    <p>Enter a Email/SMS  and check whether it looks like spam.</p>

    <label for="subjectInput">Message Subject</label>
    <input id="subjectInput" type="text" placeholder=" " />

    <div class="buttons">
      <button id="checkBtn" type="button">Check</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>

    <div id="result" aria-live="polite"></div>
  </main>

  <script>
    const subjectInput = document.getElementById("subjectInput");
    const result = document.getElementById("result");
    const checkBtn = document.getElementById("checkBtn");
    const clearBtn = document.getElementById("clearBtn");

    async function checkSpam() {
      const subject = subjectInput.value.trim().toLowerCase();

      if (!subject) {
        result.textContent = "Please enter an email subject.";
        result.className = "";
        return;
      }

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ subject })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Prediction failed.");
        }

        if (data.prediction === "spam") {
          result.textContent = "Result: Spam";
          result.className = "spam";
        } else {
          result.textContent = "Result: Not Spam";
          result.className = "not-spam";
        }
      } catch (error) {
        result.textContent = `Error: ${error.message}`;
        result.className = "";
      }
    }

    function clearForm() {
      subjectInput.value = "";
      result.textContent = "";
      result.className = "";
      subjectInput.focus();
    }

    checkBtn.addEventListener("click", checkSpam);
    clearBtn.addEventListener("click", clearForm);
    subjectInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkSpam();
      }
    });
  </script>
</body>
</html>
